name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Rodar shellcheck
        run: shellcheck main.sh lib/*.sh modules/*.sh config/*.sh

  test:
    name: Testes (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar bats-core
        run: |
          git clone https://github.com/bats-core/bats-core /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Criar diretórios de fixture para testes de backup
        run: |
          mkdir -p /tmp/myapp_origem /tmp/myapp_backup
          touch /tmp/myapp_origem/dado.txt

      - name: Rodar testes
        run: bats tests/
